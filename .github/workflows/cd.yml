name: CD Pipeline

on:
  push:
    branches:
      - main
      
jobs:
  verify-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Run tests (with coverage)
        run: npm run test:cov

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  tag-version:
    runs-on: ubuntu-latest
    needs: verify-app
    outputs:
      new_tag: ${{ steps.tag_bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag_bump
        uses: anothrNick/github-tag-action@1.67.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true

  build-and-push-image:
    runs-on: ubuntu-latest
    needs: tag-version
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build image locally and export it to Docker daemon (load: true) to test it first
      - name: Build Docker image for testing
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: venilson/inclu-plan-api:latest

      # Run smoke test on the built image
      - name: Smoke test image has dist/main
        run: |
          docker run --rm venilson/inclu-plan-api:latest sh -lc \
          "test -d /usr/src/app/dist && test -f /usr/src/app/dist/main.js && echo 'OK' || (echo 'NO DIST/MAIN' && exit 1)"

      # If the test passed, quickly build and push the tags
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            venilson/inclu-plan-api:latest
            venilson/inclu-plan-api:${{ needs.tag-version.outputs.new_tag }}
