sonar.projectKey=venilsonaquino_inclu-plan-api
sonar.projectName=inclu-plan-api
sonar.organization=venilsonaquino

# Paths to sources
sonar.sources=src
sonar.tests=src,tests
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts
sonar.exclusions=**/*.spec.ts,dist/**,node_modules/**,coverage/**,**/*.module.ts,**/main.ts

# Test coverage information
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.spec.ts,dist/**,node_modules/**,coverage/**,**/*.module.ts,**/main.ts

# Encoding
sonar.sourceEncoding=UTF-8
